{% extends 'base.html' %}

{% block title %}Новый договор{% endblock %}

{% block content %}

<h2>Создание нового договора</h2>

<hr>

<form method="POST" action="{{ url_for('policy.add_policy') }}">

    <label>Клиент: <span style="color:red">*</span></label><br>
    <select name="client_id" required>
        <option value="">— выберите клиента —</option>
        {% for c in clients %}
        <option value="{{ c.id }}"
            {% if preselected_client and preselected_client.id == c.id %}selected{% endif %}>
            {{ c.full_name }} ({{ c.age }} лет)
        </option>
        {% endfor %}
    </select><br><br>

    <label>Номер договора: <span style="color:red">*</span></label><br>
    <input type="text" name="contract_number" placeholder="LIFE-2024-001" required><br><br>

    <label>Дата заключения: <span style="color:red">*</span></label><br>
    <input type="date" name="issue_date" required><br><br>

    <label>Тип страхования: <span style="color:red">*</span></label><br>
    <select name="insurance_type" required>
        <option value="">— выберите тип —</option>
        <option value="life">Страхование жизни (рисковое)</option>
        <option value="endowment">Накопительное страхование жизни</option>
        <option value="term">Срочное страхование</option>
        <option value="annuity">Аннуитет</option>
        <option value="mixed">Смешанное страхование</option>
    </select><br><br>

    <label>Срок договора (лет): <span style="color:red">*</span></label><br>
    <input type="number" name="term_years" min="1" max="50" required><br><br>

    <label>Страховая сумма: <span style="color:red">*</span></label><br>
    <input type="number" step="0.01" min="0" name="sum_insured" required><br><br>

    <label>Размер взноса: <span style="color:red">*</span></label><br>
    <input type="number" step="0.01" min="0" name="premium" required><br><br>

    <label>Периодичность взносов:</label><br>
    <select name="premium_frequency">
        <option value="monthly">Ежемесячно</option>
        <option value="yearly">Ежегодно</option>
    </select><br><br>

    <label>Ставка доходности (для накопительного), %:</label><br>
    <input type="number" step="0.01" min="0" max="100" name="interest_rate"
           placeholder="0.00"><br><br>

    <hr>
    <h4>Выгодоприобретатель</h4>

    <label>ФИО:</label><br>
    <input type="text" name="beneficiary_name"><br><br>

    <label>Степень родства:</label><br>
    <select name="beneficiary_relation">
        <option value="">—</option>
        <option value="spouse">Супруг(а)</option>
        <option value="child">Ребёнок</option>
        <option value="parent">Родитель</option>
        <option value="sibling">Брат/сестра</option>
        <option value="other">Другое</option>
    </select><br><br>

    <label>Телефон:</label><br>
    <input type="tel" name="beneficiary_phone" placeholder="+7 (___) ___-__-__"><br><br>

    <label>Email:</label><br>
    <input type="email" name="beneficiary_email"><br><br>

    <hr>

    <button type="submit">Создать договор</button>

</form>

<hr>

<a href="{{ url_for('policy.policies') }}"><button type="button">Назад</button></a>

{% endblock %}
